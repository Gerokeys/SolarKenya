##
## Nginx configuration for SolarKenya
## Place this in: /etc/nginx/sites-available/solarkenya.co.ke
## Then: sudo ln -s /etc/nginx/sites-available/solarkenya.co.ke /etc/nginx/sites-enabled/
##

server {
    listen 80;
    server_name solarkenya.co.ke www.solarkenya.co.ke;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name solarkenya.co.ke www.solarkenya.co.ke;

    # SSL certificates (Certbot will populate these)
    ssl_certificate /etc/letsencrypt/live/solarkenya.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/solarkenya.co.ke/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Serve React frontend
    root /var/www/solar-kenya/frontend/dist;
    index index.html;

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|webp|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy to Node.js backend
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Serve uploaded images
    location /uploads/ {
        alias /var/www/solar-kenya/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA fallback — all other routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
